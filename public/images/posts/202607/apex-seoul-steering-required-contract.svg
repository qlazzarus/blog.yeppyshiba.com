      </g>
      <text x="24" y="397" fill="#ffe0a0" font-size="16">Result: line and exit speed matter</text>
    </g>

    <g transform="translate(760 0)">
      <rect width="344" height="420" rx="16" fill="#10212c" stroke="#285069"/>
      <text x="24" y="42" fill="#8ce6c2" font-size="23" font-weight="700">3. One contact, one hit</text>
      <text x="24" y="72" fill="#b8cbd3" font-size="16">enter → stay → exit lifecycle</text>
      <line x1="46" y1="150" x2="298" y2="150" stroke="#d0e8f0" stroke-width="10"/>
      <g transform="translate(88 150) rotate(18)">
        <rect x="-34" y="-21" width="68" height="42" rx="8" fill="#8fbcd2" stroke="#061018" stroke-width="6"/>
