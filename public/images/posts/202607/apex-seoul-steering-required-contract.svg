  </defs>
  <rect width="1200" height="720" rx="22" fill="url(#bg)"/>
  <text x="60" y="72" fill="#f1f9fc" font-family="Arial, sans-serif" font-size="34" font-weight="700">A corner must require a steering decision</text>
  <text x="60" y="108" fill="#a8c2ce" font-family="Arial, sans-serif" font-size="18">Apex Seoul · world-line cornering contract · HR-3H → HR-3K</text>

  <g transform="translate(48 150)" font-family="Arial, sans-serif">
    <rect width="344" height="420" rx="16" fill="#10212c" stroke="#285069"/>
    <text x="24" y="42" fill="#70ddff" font-size="23" font-weight="700">1. No steering</text>
    <text x="24" y="72" fill="#b8cbd3" font-size="16">Keep the car's world heading</text>
    <path d="M52 360C108 334 128 278 142 218C156 158 190 114 294 96" fill="none" stroke="#506873" stroke-width="58"/>
    <path d="M52 360C108 334 128 278 142 218C156 158 190 114 294 96" fill="none" stroke="#d7c45d" stroke-width="3" stroke-dasharray="12 12"/>
    <path d="M125 350L125 112" fill="none" stroke="#70ddff" stroke-width="6" marker-end="url(#cyanArrow)"/>
    <rect x="88" y="318" width="74" height="44" rx="9" fill="#8fbcd2" stroke="#061018" stroke-width="6"/>
    <circle cx="295" cy="95" r="10" fill="#ff6f6f"/>
    <text x="24" y="397" fill="#ffb1a8" font-size="16">Result: outside rail threat</text>

    <g transform="translate(380 0)">
      <rect width="344" height="420" rx="16" fill="#10212c" stroke="#285069"/>
      <text x="24" y="42" fill="#ffc85a" font-size="23" font-weight="700">2. Grip or drift</text>
      <text x="24" y="72" fill="#b8cbd3" font-size="16">Brake, turn in, manage the exit</text>
      <path d="M52 360C108 334 128 278 142 218C156 158 190 114 294 96" fill="none" stroke="#506873" stroke-width="58"/>
      <path d="M52 360C108 334 128 278 142 218C156 158 190 114 294 96" fill="none" stroke="#d7c45d" stroke-width="3" stroke-dasharray="12 12"/>
      <path d="M123 347C127 281 135 226 160 177C183 133 223 108 280 98" fill="none" stroke="#ffc85a" stroke-width="6" marker-end="url(#amberArrow)"/>
