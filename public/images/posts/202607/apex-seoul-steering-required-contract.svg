    <text x="422" y="36" fill="#8ce6c2" font-size="19" font-weight="700">8 / 8 rail hits at 185 km/h</text>
    <text x="744" y="36" fill="#ffc85a" font-size="19" font-weight="700">drift exit ≤ 0.179 rad</text>
