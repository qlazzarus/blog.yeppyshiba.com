      <circle cx="123" cy="145" r="16" fill="#ff6f6f" opacity=".9"/>
      <path d="M122 145L178 210" stroke="#8ce6c2" stroke-width="6" marker-end="url(#cyanArrow)"/>
      <text x="24" y="264" fill="#a8c2ce" font-size="16">same-rail impacts</text>
      <rect x="24" y="286" width="272" height="24" rx="5" fill="#263945"/>
      <rect x="24" y="286" width="250" height="24" rx="5" fill="#ff776f"/>
