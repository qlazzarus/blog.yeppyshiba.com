  <g transform="translate(60 616)" font-family="Arial, sans-serif">
    <rect width="1080" height="58" rx="12" fill="#08131a" stroke="#25475a"/>
    <text x="24" y="36" fill="#cfe5ed" font-size="18">Production audit</text>
